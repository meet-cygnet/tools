name: Publish Tools as Release Artifacts

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: List files in tools directory
        run: |
          echo "Files in tools directory:"
          ls -la ./

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create release
        run: |
          gh release create ${{ steps.tag.outputs.tag }} --title "Release ${{ steps.tag.outputs.tag }}" --notes "Automated release from commit ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload files as release assets
        run: |
          for file in *; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "Uploading $filename as release asset"
              gh release upload ${{ steps.tag.outputs.tag }} "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
